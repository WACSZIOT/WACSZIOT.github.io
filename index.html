<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仓库管理系统</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/mobile.css">
    <!-- Firebase SDK (使用传统脚本标签) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script>
        // Firebase 配置
        const firebaseConfig = {
            apiKey: "AIzaSyC9qfBkq3W4d1e7X7e5X6e8e9e0e1e2e3e4",
            authDomain: "warehouse-management-7c4a9.firebaseapp.com",
            databaseURL: "https://warehouse-management-7c4a9-default-rtdb.firebaseio.com",
            projectId: "warehouse-management-7c4a9",
            storageBucket: "warehouse-management-7c4a9.appspot.com",
            messagingSenderId: "1234567890",
            appId: "1:1234567890:web:1234567890abcdef"
        };
        
        // 初始化 Firebase
        try {
            // 检查 Firebase 是否加载成功
            if (typeof firebase !== 'undefined') {
                console.log('Firebase SDK 加载成功');
                
                // 初始化 Firebase 应用
                const app = firebase.initializeApp(firebaseConfig);
                console.log('Firebase App 初始化成功:', app);
                
                // 初始化数据库
                const database = firebase.database();
                console.log('Firebase 数据库初始化成功:', database);
                
                // 测试数据库连接
                const connectedRef = database.ref('.info/connected');
                connectedRef.on('value', function(snapshot) {
                    console.log('Firebase 数据库连接状态:', snapshot.val());
                });
                
                // 将 Firebase 对象暴露到全局作用域
                window.firebase = firebase;
                console.log('Firebase 对象已暴露到全局作用域');
            } else {
                console.error('Firebase SDK 未加载');
            }
        } catch (error) {
            console.error('Firebase 初始化失败:', error);
        }
    </script>
</head>
<body>
    <div class="container" id="app">
        <div id="login-section" class="login-section">
            <h2>仓库管理系统</h2>
            <div class="login-form">
                <input type="text" id="username" placeholder="用户名">
                <input type="password" id="password" placeholder="密码">
                <button onclick="login()">登录</button>
                <button onclick="showRegister()">注册</button>
            </div>
            <div id="register-form" class="register-form" style="display: none;">
                <input type="text" id="reg-username" placeholder="用户名">
                <input type="password" id="reg-password" placeholder="密码">
                <button onclick="register()">注册</button>
                <button onclick="showLogin()">返回登录</button>
            </div>
        </div>
        
        <div id="main-section" class="main-section" style="display: none;">
            <header>
                <h1>仓库管理系统</h1>
                <div class="user-info">
                    <span id="current-user"></span>
                    <button onclick="logout()">退出</button>
                </div>
            </header>
            
            <nav>
                <ul>
                    <li><a href="#" onclick="showModule('inventory')">仓库管理</a></li>
                    <li><a href="#" onclick="showModule('purchase')">进货管理</a></li>
                    <li><a href="#" onclick="showModule('sales')">销货管理</a></li>
                    <li><a href="#" onclick="showModule('users')">账号管理</a></li>
                </ul>
            </nav>
            
            <main>
                <div id="inventory-module" class="module">
                    <h2>仓库管理</h2>
                    <div class="search-box">
                        <input type="text" id="inventory-search" placeholder="搜索商品">
                        <button onclick="searchInventory()">搜索</button>
                    </div>
                    <div class="table-container">
                        <table id="inventory-table">
                            <thead>
                                <tr>
                                    <th>商品名称</th>
                                    <th>库存数量</th>
                                    <th>成本价</th>
                                    <th>零售价</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody>
                            </tbody>
                        </table>
                    </div>
                </div>
                
                <div id="purchase-module" class="module" style="display: none;">
                    <h2>进货管理</h2>
                    <div class="form-group">
                        <input type="text" id="purchase-name" placeholder="商品名称">
                        <input type="number" id="purchase-quantity" placeholder="数量">
                        <input type="number" step="0.01" id="purchase-cost" placeholder="成本价">
                        <input type="number" step="0.01" id="purchase-price" placeholder="零售价">
                        <button onclick="addPurchase()">添加进货</button>
                    </div>
                    <div class="table-container">
                        <table id="purchase-table">
                            <thead>
                                <tr>
                                    <th>商品名称</th>
                                    <th>数量</th>
                                    <th>成本价</th>
                                    <th>零售价</th>
                                    <th>日期</th>
                                </tr>
                            </thead>
                            <tbody>
                            </tbody>
                        </table>
                    </div>
                </div>
                
                <div id="sales-module" class="module" style="display: none;">
                    <h2>销货管理</h2>
                    <div class="form-group">
                        <input type="text" id="sales-name" placeholder="商品名称">
                        <input type="number" id="sales-quantity" placeholder="数量">
                        <button onclick="addSales()">添加销货</button>
                    </div>
                    <div class="table-container">
                        <table id="sales-table">
                            <thead>
                                <tr>
                                    <th>商品名称</th>
                                    <th>数量</th>
                                    <th>零售价</th>
                                    <th>日期</th>
                                </tr>
                            </thead>
                            <tbody>
                            </tbody>
                        </table>
                    </div>
                </div>
                
                <div id="users-module" class="module" style="display: none;">
                    <h2>账号管理</h2>
                    <div class="table-container">
                        <table id="users-table">
                            <thead>
                                <tr>
                                    <th>用户名</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>
    
    <script src="js/app.js"></script>
</body>
</html>
