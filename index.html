<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仓库管理系统</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/mobile.css">
</head>
<body>
    <div class="container" id="app">
        <div id="login-section" class="login-section">
            <h2>仓库管理系统</h2>
            <div class="login-form">
                <input type="text" id="username" placeholder="用户名">
                <input type="password" id="password" placeholder="密码">
                <button onclick="login()">登录</button>
                <button onclick="showRegister()">注册</button>
            </div>
            <div id="register-form" class="register-form" style="display: none;">
                <input type="text" id="reg-username" placeholder="用户名">
                <input type="password" id="reg-password" placeholder="密码">
                <button onclick="register()">注册</button>
                <button onclick="showLogin()">返回登录</button>
            </div>
        </div>
        
        <div id="main-section" class="main-section" style="display: none;">
            <header>
                <h1>仓库管理系统</h1>
                <div class="user-info">
                    <span id="current-user"></span>
                    <button onclick="exportData()">导出数据</button>
                    <button onclick="importData()">导入数据</button>
                    <button onclick="logout()">退出</button>
                </div>
            </header>
            
            <nav>
                <ul>
                    <li><a href="#" onclick="showModule('inventory')">仓库管理</a></li>
                    <li><a href="#" onclick="showModule('purchase')">进货管理</a></li>
                    <li><a href="#" onclick="showModule('sales')">销货管理</a></li>
                    <li><a href="#" onclick="showModule('users')">账号管理</a></li>
                </ul>
            </nav>
            
            <main>
                <div id="inventory-module" class="module">
                    <h2>仓库管理</h2>
                    <div class="search-box">
                        <input type="text" id="inventory-search" placeholder="搜索商品">
                        <button onclick="searchInventory()">搜索</button>
                    </div>
                    <div class="table-container">
                        <table id="inventory-table">
                            <thead>
                                <tr>
                                    <th>商品名称</th>
                                    <th>库存数量</th>
                                    <th>成本价</th>
                                    <th>零售价</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody>
                            </tbody>
                        </table>
                    </div>
                </div>
                
                <div id="purchase-module" class="module" style="display: none;">
                    <h2>进货管理</h2>
                    <div class="form-group">
                        <input type="text" id="purchase-name" placeholder="商品名称">
                        <input type="number" id="purchase-quantity" placeholder="数量">
                        <input type="number" step="0.01" id="purchase-cost" placeholder="成本价">
                        <input type="number" step="0.01" id="purchase-price" placeholder="零售价">
                        <button onclick="addPurchase()">添加进货</button>
                    </div>
                    <div class="table-container">
                        <table id="purchase-table">
                            <thead>
                                <tr>
                                    <th>商品名称</th>
                                    <th>数量</th>
                                    <th>成本价</th>
                                    <th>零售价</th>
                                    <th>日期</th>
                                </tr>
                            </thead>
                            <tbody>
                            </tbody>
                        </table>
                    </div>
                </div>
                
                <div id="sales-module" class="module" style="display: none;">
                    <h2>销货管理</h2>
                    <div class="form-group">
                        <input type="text" id="sales-name" placeholder="商品名称">
                        <input type="number" id="sales-quantity" placeholder="数量">
                        <button onclick="addSales()">添加销货</button>
                    </div>
                    <div class="table-container">
                        <table id="sales-table">
                            <thead>
                                <tr>
                                    <th>商品名称</th>
                                    <th>数量</th>
                                    <th>零售价</th>
                                    <th>日期</th>
                                </tr>
                            </thead>
                            <tbody>
                            </tbody>
                        </table>
                    </div>
                </div>
                
                <div id="users-module" class="module" style="display: none;">
                    <h2>账号管理</h2>
                    <div class="table-container">
                        <table id="users-table">
                            <thead>
                                <tr>
                                    <th>用户名</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>
    
    <script src="js/app.js"></script>
</body>
</html>
